<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Feed Sign Up</title>

    <style>
        * {
            margin: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: rgb(120, 96, 64);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; 
        }

        #formContainer {
            background: white;
            width: 420px;
            border-radius: 12px;
            border: 2px solid darkblue;
            overflow: hidden;
        }

        #headerImage {
            position: relative;
            height: 150px; 
            overflow: hidden;
            border-top-left-radius: 12px;
            border-top-right-radius: 12px;
        }

        #headerImage img {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }

        #headerText {
            position: absolute;
            top: 10px;
            width: 100%;
            text-align: center;
            color: white;
            text-shadow: 2px 2px 4px black;
        }

        #headerText .main {
            font-size: 1.4rem;
            font-weight: bold;
        }

        #headerText .sub {
            font-size: 0.9rem;
            margin-top: 3px;
        }

        #innerForm {
            padding: 18px 22px;
        }

        #innerForm h3 {
            text-align: center;
            margin-bottom: 15px;
        }

        .formRow {
            display: grid;
            grid-template-columns: 130px 1fr;
            align-items: center;
            margin-bottom: 10px;
        }

        .formRow label {
            font-weight: bold;
        }

        .formRow input[type="text"],
        .formRow input[type="password"],
        .formRow input[type="email"] {
            width: 100%;
            padding: 6px;
            border: 1px solid #aaa;
            border-radius: 4px;
        }

        #genderRow {
            display: grid;
            grid-template-columns: 130px 1fr;
            align-items: center;
            margin-bottom: 10px;
        }

        #genderOptions {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .checkRow {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 6px 0;
        }

        #innerForm button[type="submit"] {
            width: 100%;
            padding: 10px;
            background-color: rgb(120, 96, 64);
            color: white;
            border: none;
            border-radius: 4px;
            margin-top: 15px;
            cursor: pointer;
        }

        #innerForm button[type="submit"]:hover {
            background-color: rgb(100, 80, 50);
        }

    #tabs {
        background: rgb(230, 230, 230);
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        height: 70px;
    }

    #tabs .tab {
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 6px;
        border-right: 1px solid #ccc;
    }

    #tabs .tab:last-child {
        border-right: none;
    }

    #tabs img {
        height: 100%;
        width: 100%;
        object-fit: contain;
    }
    </style>
</head>
<body>
    <div id="formContainer">
        <div id="headerImage">
            <img src="images/jesus_feeds_5000.jpeg" alt="Jesus Feeds 5000">

            <div id="headerText">
                <div class="main">Daily Feed</div>
                <div class="sub">Scripture a Day</div>
            </div>
        </div>
        <div id="innerForm">
            <h3>Sign Up for Daily Scripture Feed</h3>

            <form id="myForm">

                <div class="formRow">
                    <label for="username">User Name:</label>
                    <input type="text" id="username" name="username" required>
                </div>

                <div class="formRow">
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" required>
                </div>

                <div class="formRow">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div id="genderRow">
                    <label>Gender:</label>
                    <div id="genderOptions">
                        <label><input type="radio" name="gender" value="male" required> Male</label>
                        <label><input type="radio" name="gender" value="female" required> Female</label>
                    </div>
                </div>

                <div class="checkRow">
                    <input type="checkbox" id="newsletter" name="newsletter">
                    <label for="newsletter">Subscribe to newsletter</label>
                </div>

                <div class="checkRow">
                    <input type="checkbox" id="conditions" name="conditions" required>
                    <label for="conditions">I acknowledge the terms and conditions</label>
                </div>

                <button type="submit">Submit</button>

            </form>
        </div>

        <div id="tabs">
            <div class="tab">
                <img src="images/old_testament.webp">
            </div>
            <div class="tab">
                <img src="images/new_testament.webp">
            </div>
            <div class="tab">
                <img src="images/book_of_mormon.webp">
            </div>
            <div class="tab">
                <img src="images/doctrine_and_covenants.webp">
            </div>
            <div class="tab">
                <img src="images/pearl_of_great_price.webp">
            </div>
        </div>

    </div>

    <div id="output"></div>

    <script>
        document.getElementById("closeBtn")?.addEventListener("click", function () {
            document.getElementById("formContainer").style.display = "none";
        });

        const form = document.getElementById('myForm');
        const output = document.getElementById('output');

        form.addEventListener('submit', function (event) {
            event.preventDefault();

            const formData = new FormData(form);
            const entries = [];

            for (const [key, value] of formData.entries()) {
                if (key == "password") {
                    entries.push(`<strong>${key}</strong>: ${value} (you should probably encrypt the password)`);
                } else {
                    entries.push(`<strong>${key}</strong>: ${value}`);
                }
            }

            output.innerHTML = `
            <br>
            <h3>Here is the data that would be sent to the server:</h3>
            <ul>
                ${entries.map(item => `<li>${item}</li>`).join('')}
            </ul>
            `;
        });
    </script>

</body>

</html>
